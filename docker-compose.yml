services:
  # =========== Database ===========
  db:
    image: pgvector/pgvector:pg15
    container_name: bible-rag-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bible_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========== Django Web App ===========
  web:
    build: .
    container_name: bible-rag-web
    # REMOVED: command: gunicorn... (now handled by entrypoint.sh)
    env_file:
      - .env
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - huggingface_cache:/app/.cache/huggingface  # NEW: for model caching
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]  # IMPROVED
      interval: 10s
      timeout: 5s
      retries: 5

  # =========== LLM (Optional) ===========
  ollama:
    image: ollama/ollama:latest
    container_name: bible-rag-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  postgres_data:
  ollama_data:
  static_files:
  huggingface_cache:  # NEW: for model persistence