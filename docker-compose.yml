version: '3.8'

services:
  # =========== Database ===========
  db:
    image: pgvector/pgvector:pg15
    container_name: bible-rag-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bible_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========== Django Web App ===========
  web:
    build: .
    container_name: bible-rag-web
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    env_file:
      - .env
    volumes:
      - .:/app  # Mount code for live editing (development)
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========== LLM (Optional but Recommended) ===========
  ollama:
    image: ollama/ollama:latest
    container_name: bible-rag-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Note: Remove gpu support if you don't have NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  postgres_data:
  ollama_data:
  static_files:
